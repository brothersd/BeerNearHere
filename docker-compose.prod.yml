services:
  db:
    image: postgres:17.9-alpine3.23
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./certs/WM_IO_private_key.pem:/app/WM_IO_private_key.pem
      - static_volume:/app/staticfiles
    env_file: .env

    command: >
      sh -c "python manage.py migrate && \
             python manage.py collectstatic --noinput && \
             python -m gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

    environment:
      - PYTHONUNBUFFERED=1
      - WALMART_PRIVATE_KEY_PATH=/app/WM_IO_private_key.pem
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/staticfiles:ro

    depends_on:
      - web
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  static_volume:
