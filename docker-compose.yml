services:
  db:
    image: postgres:17.9-bookworm
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - ./certs/WM_IO_private_key.pem:/app/WM_IO_private_key.pem:ro
    ports:
      - "8000:8000"
    env_file: .env
    
    command: >
      bash -c "python manage.py migrate &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - WALMART_PRIVATE_KEY_PATH=/app/WM_IO_private_key.pem
    depends_on:
      db:
        condition: service_healthy

  react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - web

volumes:
  postgres_data: